<div style="padding: .5em 1em 0.5em 1em;" *ngIf="profile">

    <period-selector (periodChanged)="periodChanged($event)" [period]="period"></period-selector>

    <mat-form-field style="padding-right: 1em;" appearance="outline">
        <mat-label>Type</mat-label>
        <mat-select placeholder="Type" [(ngModel)]="type" (selectionChange)="typeChanged()" >
            <mat-option *ngFor="let type of types" [value]="type">{{type}}</mat-option>
        </mat-select>
    </mat-form-field>


    <mat-form-field appearance="outline" >
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input >
    </mat-form-field>

    <div class="section-caption">Logs
        <mat-icon  *ngIf="loading"><mat-spinner diameter="20"></mat-spinner></mat-icon>
    </div>


    <div>
        <table mat-table [dataSource]="dataSource" matSort>
            <ng-container *ngFor="let col of colnames" [matColumnDef]="col">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> {{coldefs[col].name}} </th>
                <td mat-cell *matCellDef="let row" (click)="rowClicked(row)"> {{row[col]}} </td>
            </ng-container>
        
            <tr mat-header-row *matHeaderRowDef="colnames"></tr>
            <tr mat-row *matRowDef="let row; columns: colnames;"></tr>
        
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" [attr.colspan]="colnames.length">No data matching the filter "{{input.value}}"</td>
            </tr>
        </table>
      
        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" [pageSize]="10" aria-label="Select page of users"></mat-paginator>
    </div>
</div>
