<div style="padding: 1em 1em;" *ngIf="profile">
    <div class="caption">Policies statewise 
        <span *ngIf="use_issue_date" style="color: #999; font-size: 0.9em;">[Using policy issue date]</span>
        <mat-icon  *ngIf="loading"><mat-spinner diameter="20"></mat-spinner></mat-icon>
    </div>
    
    <period-selector (periodChanged)="periodChanged($event)" [period]="period"></period-selector>

    <mat-form-field appearance="outline">
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
    </mat-form-field>
    
    <mat-checkbox (click)="$event.stopPropagation()" style="padding-left: 1em;"
        [checked]="attributes"
        (change)="toggleAttributes()">With attributes</mat-checkbox>
    

    <div>
        <table mat-table [dataSource]="dataSource" matSort>
            <ng-container matColumnDef="select">
                <th mat-header-cell *matHeaderCellDef>
                    <mat-checkbox (click)="$event.stopPropagation()"
                        (change)="selectAll()"
                        [checked]="allSelected">
                    </mat-checkbox>
                </th>
                <td mat-cell *matCellDef="let row; let r=index;">
                    <mat-checkbox (click)="$event.stopPropagation()"
                        (change)="toggleSelected(row.index)"
                        [checked]="selected[row.index]">
                    </mat-checkbox>
                </td>
            </ng-container>
            <ng-container *ngFor="let col of colnames" [matColumnDef]="col">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> {{coldefs[col].name}} </th>
                <td mat-cell *matCellDef="let row" (click)="rowClicked(row)"> {{row[col]}} </td>
            </ng-container>
        
            <tr mat-header-row *matHeaderRowDef="dcolumns"></tr>
            <tr mat-row *matRowDef="let row; columns: dcolumns;"></tr>
        
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" [attr.colspan]="colnames.length" style="text-align: center;">No data matching the filter "{{input.value}}"</td>
            </tr>
        </table>
        <div style="display: grid; grid-template-columns: auto auto 1fr;">
            <div><button mat-flat-button class="ibutton" *ngIf="!noneSelected" (click)="requeue()">Requeue</button></div>
            <div><button mat-flat-button class="ibutton" (click)="exportCSV()">Export as CSV</button></div>
            <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" [pageSize]="10" aria-label="Select page of users"></mat-paginator>
        </div>
    </div>
      

</div>
